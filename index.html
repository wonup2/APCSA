, "answer": "C"}, {"n": 39, "text": "39. For which array will insertion sort make the fewest shifts?\n  Unit 4 | Insertion sort best case | Medium\n    Assume insertion sort is sorting in ascending order.\n\n  (A) {9, 7, 5, 3}\n  (B) {4, 1, 3, 2}\n  (C) {2, 2, 1, 1}\n  (D) {1, 3, 5, 7}", "answer": "D"}, {"n": 40, "text": "40. Two sorted arrays are merged into one sorted array. What is the resulting array?\n  Unit 4 | Merge sort concept | Medium\n    int[] a = {1, 4, 9};\n    int[] b = {2, 3, 10};\n\n  (A) {1, 2, 3, 4, 9, 10}\n  (B) {1, 4, 9, 2, 3, 10}\n  (C) {2, 3, 10, 1, 4, 9}\n  (D) {1, 2, 4, 3, 9, 10}", "answer": "A"}, {"n": 41, "text": "41. What is returned by the call mystery(6)?\n  Unit 4 | Recursion tracing | Hard\n    public static int mystery(int n)\n    {\n        if (n <= 1)\n        {\n            return 1;\n        }\n        return n + mystery(n - 2);\n    }\n\n  (A) 10\n  (B) 12\n  (C) 13\n  (D) 21", "answer": "C"}, {"n": 42, "text": "42. How many times is recSearch called, including the original call?\n  Unit 4 | Recursive binary search | Hard\n    public static int recSearch(int[] arr, int target, int left, int right)\n    {\n        if (left > right)\n        {\n            return -1;\n        }\n\n          int mid = (left + right) / 2;\n\n          if (arr[mid] == target)\n          {\n               return mid;\n          }\n          else if (target < arr[mid])\n          {\n               return recSearch(arr, target, left, mid - 1);\n          }\n          else\n          {\n               return recSearch(arr, target, mid + 1, right);\n          }\n    }\n\n    int[] arr = {1, 3, 5, 7, 9, 11, 13};\n    recSearch(arr, 2, 0, arr.length - 1);\n\n  (A) 1\n  (B) 2\n  (C) 3\n  (D) 4", "answer": "D"}]}];
let state = {screen:'home', testIndex:null, qIndex:0, answers:{}, flags:{}, submitted:false, endTime:null, remaining:null, filterWrong:false};
let tick=null;
const $ = (sel)=>document.querySelector(sel);
function storageKey(t){return 'apcsa-cbt-v2-'+t.id}
function save(){ if(state.testIndex!==null){ const t=TESTS[state.testIndex]; localStorage.setItem(storageKey(t), JSON.stringify({answers:state.answers,flags:state.flags,submitted:state.submitted,remaining:getRemaining(),qIndex:state.qIndex,filterWrong:state.filterWrong})); }}
function load(i){ const raw=localStorage.getItem(storageKey(TESTS[i])); if(!raw) return null; try{return JSON.parse(raw)}catch(e){return null}}
function getRemaining(){ if(!state.endTime) return state.remaining; return Math.max(0, Math.floor((state.endTime-Date.now())/1000)); }
function fmt(sec){ sec=Math.max(0,sec||0); const m=Math.floor(sec/60), s=sec%60; return String(m).padStart(2,'0')+':'+String(s).padStart(2,'0'); }
function render(){ const app=$('#app'); if(state.screen==='home') return renderHome(app); return renderExam(app); }
function renderHome(app){ clearInterval(tick); tick=null; app.innerHTML=`
  <div class="top"><div class="brand"><div class="logo">AP</div><div><h1>AP CSA Practice Center</h1><p>Computer-based practice exams for AP Computer Science A</p></div></div><div class="pill">GitHub Pages ready · local save only</div></div>
  <section class="hero"><h2>Choose a practice exam.</h2><p>Each exam opens in a clean computer-based test interface with timer, question navigation, flagging, keyboard shortcuts, auto-save, scoring, and review mode. The design is intentionally light and readable for students.</p><div style="margin-top:18px"><button class="btn secondary" onclick="clearAllSaved()">Reset all saved attempts</button></div><div class="cards">${TESTS.map((t,i)=>card(t,i)).join('')}</div></section>
  <div class="footer">Unofficial practice resource. Not affiliated with or endorsed by College Board.</div>`;
}
function card(t,i){ const saved=load(i); const answered=saved?Object.keys(saved.answers||{}).length:0; const q=t.questions.length; const submitted=!!saved?.submitted; return `<article class="card" onclick="startTest(${i})"><div class="tag">Set ${i+1}</div><h3>${esc(t.title)}</h3><p>${esc(t.subtitle)}</p><div class="meta"><span class="chip">${q} questions</span><span class="chip gray">${t.minutes} min</span>${saved?`<span class="chip gray">${submitted?'submitted':'saved'} ${answered}/${q}</span>`:''}</div>${saved?`<div class="cardActions"><button class="miniBtn primary" onclick="event.stopPropagation(); startTest(${i})">${submitted?'Review':'Resume'}</button><button class="miniBtn danger" onclick="event.stopPropagation(); resetTest(${i})">Start over</button></div>`:''}</article>`; }
function startTest(i){ const t=TESTS[i]; const saved=load(i); state={screen:'exam',testIndex:i,qIndex:saved?.qIndex||0,answers:saved?.answers||{},flags:saved?.flags||{},submitted:saved?.submitted||false,remaining:saved?.remaining||t.minutes*60,endTime:null,filterWrong:saved?.filterWrong||false}; if(!state.submitted){state.endTime=Date.now()+state.remaining*1000; startTimer();} render(); }
function startTimer(){ clearInterval(tick); tick=setInterval(()=>{ if(state.screen!=='exam'||state.submitted) return; const r=getRemaining(); const el=$('#timer'); if(el) el.textContent=fmt(r); const bar=$('#bar'); if(bar){ const t=TESTS[state.testIndex]; bar.style.width=(100*(Object.keys(state.answers).length/t.questions.length)).toFixed(1)+'%'; } if(r<=0){ submitExam(true); } save(); },1000); }
function backHome(){ save(); state.screen='home'; render(); }
function renderExam(app){ const t=TESTS[state.testIndex], q=t.questions[state.qIndex], total=t.questions.length; const correctCount=countCorrect(t); const answered=Object.keys(state.answers).length; app.innerHTML=`<div class="examShell"><aside class="side"><h2>${esc(t.title)}</h2><div class="sub">${esc(t.subtitle)}</div><div class="timer" id="timer">${state.submitted?'Submitted':fmt(getRemaining())}</div><div class="progressLine"><div class="bar" id="bar" style="width:${100*answered/total}%"></div></div><div class="sub">Answered ${answered}/${total}${state.submitted?` · Score ${correctCount}/${total}`:''}</div><div class="grid">${gridButtons(t)}</div><div class="sideActions"><button class="btn secondary" onclick="backHome()">Back to exams</button><button class="btn warn" onclick="toggleFlag()">${state.flags[q.n]?'Unflag':'Flag'} question</button><button class="btn secondary" onclick="clearAnswer()">Clear answer</button>${state.submitted?`<button class="btn accent" onclick="retakeCurrent()">Retake exam</button><button class="btn secondary" onclick="toggleWrongFilter()">${state.filterWrong?'Show all':'Show missed only'}</button><button class="btn secondary" onclick="window.print()">Print result</button>`:`<button class="btn secondary" onclick="resetCurrentProgress()">Reset progress</button><button class="btn accent" onclick="confirmSubmit()">Submit exam</button>`}</div></aside><main class="main">${state.submitted?resultPanel(t):''}<div class="examTop"><div><h2>Question ${q.n} of ${total}</h2><p>${state.submitted?'Review mode': t.note ? esc(t.note):'Select the best answer.'}</p></div><div class="shortcuts">Shortcuts: <span class="kbd">A-D</span> answer · <span class="kbd">F</span> flag · <span class="kbd">←</span><span class="kbd">→</span> move</div></div><div class="questionArea"><div class="qTitle"><h3>Question ${q.n}</h3>${state.flags[q.n]?'<span class="flagBadge">FLAGGED</span>':''}</div><pre class="questionText">${esc(q.text)}</pre><div class="answers">${['A','B','C','D'].map(a=>answerButton(q,a)).join('')}</div>${state.submitted?reviewLine(q):''}<div class="nav"><button class="btn secondary" onclick="prevQ()" ${state.qIndex===0?'disabled':''}>Previous</button><button class="btn secondary" onclick="nextUnanswered()">Next unanswered</button><button class="btn accent" onclick="nextQ()" ${state.qIndex===total-1?'disabled':''}>Next</button></div></div></main></div>`; }
function gridButtons(t){ return t.questions.map((q,i)=>{ const a=state.answers[q.n]; let cls='qbtn'; if(i===state.qIndex) cls+=' current'; if(a) cls+=' answered'; if(state.flags[q.n]) cls+=' flagged'; if(state.submitted && a){ cls += a===q.answer ? ' correct':' wrong'; } return `<button class="${cls}" onclick="goQ(${i})">${q.n}</button>`; }).join(''); }
function answerButton(q,a){ let cls='ans'; const chosen=state.answers[q.n]; if(chosen===a) cls+=' selected'; if(state.submitted){ if(a===q.answer) cls+=' correct'; else if(chosen===a && chosen!==q.answer) cls+=' incorrect'; } return `<button class="${cls}" onclick="selectAnswer('${a}')" ${state.submitted?'disabled':''}>${a}</button>`; }
function reviewLine(q){ const chosen=state.answers[q.n]||'No answer'; const ok=chosen===q.answer; return `<div class="reviewNote"><b>${ok?'Correct':'Review'}:</b> Your answer: ${chosen}. Correct answer: ${q.answer}.</div>`; }
function resultPanel(t){ const total=t.questions.length, correct=countCorrect(t); const pct=Math.round(100*correct/total); return `<section class="result"><p class="score">${correct}/${total} <span style="font-size:22px;color:var(--muted)">(${pct}%)</span></p><p>${pct>=85?'Excellent AP-style accuracy.':'Review missed questions and trace code carefully.'}</p></section>`; }
function countCorrect(t){ return t.questions.reduce((s,q)=>s+(state.answers[q.n]===q.answer?1:0),0); }
function selectAnswer(a){ const q=TESTS[state.testIndex].questions[state.qIndex]; state.answers[q.n]=a; save(); render(); }
function toggleFlag(){ const q=TESTS[state.testIndex].questions[state.qIndex]; state.flags[q.n]=!state.flags[q.n]; if(!state.flags[q.n]) delete state.flags[q.n]; save(); render(); }
function clearAnswer(){ if(state.submitted) return; const q=TESTS[state.testIndex].questions[state.qIndex]; delete state.answers[q.n]; save(); render(); }
function goQ(i){ state.qIndex=i; save(); render(); }
function nextQ(){ const t=TESTS[state.testIndex]; if(state.qIndex<t.questions.length-1){state.qIndex++; save(); render();}}
function prevQ(){ if(state.qIndex>0){state.qIndex--; save(); render();}}
function nextUnanswered(){ const t=TESTS[state.testIndex]; let start=state.qIndex+1; for(let k=0;k<t.questions.length;k++){ const i=(start+k)%t.questions.length; if(!state.answers[t.questions[i].n]){state.qIndex=i; save(); render(); return;} } }

function resetTest(i){
  const t=TESTS[i];
  const msg='Start this exam over? This will erase saved answers, flags, score, and submitted status for "'+t.title+'".';
  if(!confirm(msg)) return;
  localStorage.removeItem(storageKey(t));
  state={screen:'exam',testIndex:i,qIndex:0,answers:{},flags:{},submitted:false,endTime:Date.now()+t.minutes*60*1000,remaining:t.minutes*60,filterWrong:false};
  startTimer();
  render();
}
function retakeCurrent(){ resetTest(state.testIndex); }
function resetCurrentProgress(){ resetTest(state.testIndex); }
function clearAllSaved(){
  if(!confirm('Clear all saved answers, flags, scores, and submitted results for every exam?')) return;
  TESTS.forEach(t=>localStorage.removeItem(storageKey(t)));
  state={screen:'home',testIndex:null,qIndex:0,answers:{},flags:{},submitted:false,endTime:null,remaining:null,filterWrong:false};
  clearInterval(tick);
  render();
}

function confirmSubmit(){ document.body.insertAdjacentHTML('beforeend', `<div class="modal" id="modal"><div class="dialog"><h3>Submit this exam?</h3><p>You answered ${Object.keys(state.answers).length}/${TESTS[state.testIndex].questions.length}. After submitting, answers will be locked and review mode will open.</p><div class="dialogActions"><button class="btn secondary" onclick="closeModal()">Cancel</button><button class="btn accent" onclick="submitExam(false)">Submit</button></div></div></div>`); }
function closeModal(){ const m=$('#modal'); if(m)m.remove(); }
function submitExam(auto){ closeModal(); state.submitted=true; state.remaining=getRemaining(); state.endTime=null; clearInterval(tick); save(); render(); if(auto) alert('Time is up. The exam has been submitted.'); }
function toggleWrongFilter(){ state.filterWrong=!state.filterWrong; if(state.filterWrong){ const t=TESTS[state.testIndex]; const idx=t.questions.findIndex(q=>state.answers[q.n]!==q.answer); if(idx>=0) state.qIndex=idx; } save(); render(); }
function esc(s){ return String(s||'').replace(/[&<>"]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
document.addEventListener('keydown', e=>{ if(state.screen!=='exam') return; if(['INPUT','TEXTAREA'].includes(document.activeElement.tagName)) return; const k=e.key.toLowerCase(); if(['a','b','c','d'].includes(k)&&!state.submitted){selectAnswer(k.toUpperCase());} else if(k==='f'){toggleFlag();} else if(e.key==='ArrowRight'){nextQ();} else if(e.key==='ArrowLeft'){prevQ();} });
render();
</script>
